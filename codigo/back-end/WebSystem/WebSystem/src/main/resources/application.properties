# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pucpay?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Email Configuration
# Para Gmail, use uma senha de app em MAIL_PASSWORD.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=davinunescarvalho35@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=davinunescarvalho35@gmail.com

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Server Configuration - Listen on all interfaces for mobile access
server.address=0.0.0.0
server.port=8080

# Front-end URL used inside QR Codes and coupon messages
app.frontend-url=http://192.168.0.108:5173

# Optional WhatsApp Cloud API configuration.
# Example api-url: https://graph.facebook.com/v20.0/{PHONE_NUMBER_ID}/messages
whatsapp.api-url=
whatsapp.access-token=
